services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: b2b_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-b2b_marketplace}
      DB_USERNAME: ${DB_USERNAME:-b2b}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      OCTANE_SERVER: frankenphp
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: b2b_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: b2b_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      # API URL as seen from the user's browser.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - nginx

  postgres:
    image: postgres:16-alpine
    container_name: b2b_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-b2b_marketplace}
      POSTGRES_USER: ${DB_USERNAME:-b2b}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-b2b} -d ${DB_DATABASE:-b2b_marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
